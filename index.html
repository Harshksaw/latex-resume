<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harsh Saw - Resume</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #111;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }
      .fallback {
        position: fixed;
        top: 1rem;
        left: 1rem;
        color: #fff;
        font-family: Arial, sans-serif;
        z-index: 2;
      }
      a { color: #8ab4f8; }
    </style>
  </head>
  <body>
    <div class="fallback">
      If the PDF does not render, open it directly:
      <a href="./harshsaw.pdf">harshsaw.pdf</a>
    </div>
    <iframe src="./harshsaw.pdf" title="Resume PDF"></iframe>
  </body>
</html>
